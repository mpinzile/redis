name: nuru
description: "Nuru - Event Planning, Ticketing, Invitations and Guest Management App"
publish_to: "none"
version: 1.3.0+8

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4
  google_fonts: ^6.2.1
  smooth_page_indicator: ^1.2.0+3
  animate_do: ^3.3.4
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  shimmer: ^3.0.0
  http: ^1.2.2
  http_parser: ^4.0.2
  path: ^1.9.0
  image_picker: ^1.1.2
  mobile_scanner: ^6.0.2
  video_player: ^2.9.2
  video_thumbnail: ^0.5.3
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  open_filex: ^4.5.0
  geolocator: ^13.0.2
  url_launcher: ^6.3.2
  package_info_plus: ^8.0.2
  permission_handler: ^11.3.1
  intl: ^0.20.2
  qr_flutter: ^4.1.0
  local_auth: ^2.3.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  image_cropper: ^8.0.2
  pdf: ^3.11.2
  printing: ^5.13.4
  excel: ^4.0.6
  file_picker: ^8.3.7
  csv: ^6.0.0
  livekit_client: ^2.5.0
  app_links: ^6.3.2
  # Voice notes (microphone capture). The emoji picker is implemented
  # in-house at lib/widgets/nuru_emoji_picker.dart, so we no longer ship
  # the heavyweight `emoji_picker_flutter` package.
  record: ^6.0.0
  audioplayers: ^6.1.0
  # Native CallKit / ConnectionService UI for incoming voice calls — used by
  # the global incoming-call poller (see lib/core/services/incoming_call_service.dart).
  flutter_callkit_incoming: ^2.5.5
  # Push notifications (FCM)
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1
  # WhatsApp-style 30s video trimmer for reels (native implementation, no FFmpeg)
  flutter_native_video_trimmer: ^1.1.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/launcher_icons/appstore.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/audio/
    - assets/illustrations/
